<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Unicorn: Duck Protocol</title>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
      background: #05010f;
      overflow: hidden;
      font-family: 'Trebuchet MS', 'Segoe UI', system-ui, sans-serif;
      color: #fff;
      touch-action: none;
    }
    #game {
      width: 100vw;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    #game canvas {
      box-shadow: 0 0 60px rgba(155, 92, 255, 0.4);
      image-rendering: auto;
    }
    /* Ladehinweis bis Phaser bootet */
    #boot {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      letter-spacing: 4px;
      color: #39f6ff;
      text-shadow: 0 0 12px #39f6ff;
      font-size: 14px;
    }
  </style>
</head>
<body>
  <div id="game"><div id="boot">LADE NEON-KERN ...</div></div>

  <!-- Vendored Phaser (CDN-Fallback, falls die lokale Datei fehlt) -->
  <script src="vendor/phaser.min.js"></script>
  <script>
    if (typeof window.Phaser === 'undefined') {
      var s = document.createElement('script');
      s.src = 'https://cdn.jsdelivr.net/npm/phaser@3.80.1/dist/phaser.min.js';
      s.onload = function () { import('./src/main.js'); };
      document.head.appendChild(s);
    }
  </script>
  <script type="module">
    if (typeof window.Phaser !== 'undefined') {
      import('./src/main.js');
    }
  </script>
</body>
</html>
